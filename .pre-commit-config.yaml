# This single file replaces terraform-module.yaml, common.yaml, secrets.yaml,
# .pre-commit-hooks.yaml, and run-hooks.
# Place this in the root of your repositories (e.g., in aws-prod-account).

repos:
  # General housekeeping hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: no-commit-to-branch
        args: [--branch, master, --branch, main]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Terraform specific hooks
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.90.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exists=true
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
          - --args=--enable-rule=terraform_documented_variables
      - id: terraform_checkov
        args:
          # Assuming .checkov.yaml is in the root of the repo running the hook
          - --args=--config-file __GIT_WORKING_DIR__/.checkov.yaml
          
  # Security hooks for secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
